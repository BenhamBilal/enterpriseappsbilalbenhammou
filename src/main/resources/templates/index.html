<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
    <title>Home - NGO Anderlecht</title>
</head>
<body>
<div th:replace="fragments/header :: menu"></div>

<main class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Upcoming Events</h1>
    <table class="w-full border-collapse border border-gray-300">
        <thead>
        <tr class="bg-gray-100">
            <th class="border p-2">Title</th>
            <th class="border p-2">Organization</th>
            <th class="border p-2">Details</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="event : ${events}">
            <td class="border p-2" th:text="${event.title}"></td>
            <td class="border p-2" th:text="${event.organization}"></td>
            <td class="border p-2">
                <a th:href="@{/detail/{id}(id=${event.id})}" class="text-blue-500 hover:underline">View</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/new}" class="inline-block mt-4 bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Add New Event</a>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
