<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
    <title>Event Details - NGO Anderlecht</title>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<div th:replace="fragments/header :: menu"></div>

<main class="container mx-auto px-4 py-8 flex-grow">
    <div class="max-w-3xl mx-auto">
        <a th:href="@{/}" class="inline-flex items-center text-sm text-primary-600 hover:text-primary-700 mb-6 transition-colors">
            <svg class="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Back to events
        </a>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-6" th:text="${event.title}">Event Title</h1>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-6">
                        <div>
                            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Description</p>
                            <p class="mt-1 text-gray-700" th:text="${event.description}">Description text</p>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Organization</p>
                            <p class="mt-1 text-gray-700" th:text="${event.organization}">Organization</p>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Contact Email</p>
                            <p class="mt-1 text-primary-600" th:text="${event.contactEmail}">email@example.com</p>
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div>
                            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Date & Time</p>
                            <p class="mt-1 text-gray-700" th:text="${event.timestamp}">2026-06-13</p>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Location</p>
                            <p class="mt-1 text-gray-700" th:text="${event.location.name}">Location name</p>
                            <p class="text-gray-500 text-sm" th:text="${event.location.address}">Address</p>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Capacity</p>
                            <p class="mt-1 text-gray-700" th:text="${event.location.capacity + ' people'}">Capacity</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
