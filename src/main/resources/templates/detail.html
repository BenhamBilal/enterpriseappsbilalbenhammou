<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
    <title>Event Details - NGO Anderlecht</title>
</head>
<body>
<div th:replace="fragments/header :: menu"></div>

<main class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4" th:text="${event.title}">Event Title</h1>
    <div class="bg-white shadow rounded p-4">
        <p><strong>Description:</strong> <span th:text="${event.description}"></span></p>
        <p><strong>Organization:</strong> <span th:text="${event.organization}"></span></p>
        <p><strong>Contact:</strong> <span th:text="${event.contactEmail}"></span></p>
        <p><strong>Date:</strong> <span th:text="${event.timestamp}"></span></p>
        <p><strong>Location:</strong> <span th:text="${event.location.name}"></span></p>
        <p><strong>Address:</strong> <span th:text="${event.location.address}"></span></p>
        <p><strong>Capacity:</strong> <span th:text="${event.location.capacity}"></span></p>
    </div>
    <a th:href="@{/static}" class="inline-block mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Back</a>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
