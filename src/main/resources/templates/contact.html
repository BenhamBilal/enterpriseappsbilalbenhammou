<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
  <title>Contact - NGO Anderlecht</title>
</head>
<body>
<div th:replace="fragments/header :: menu"></div>

<main class="container mx-auto p-4">
  <h1 class="text-2xl font-bold mb-4">Contact Us</h1>
  <div th:if="${param.success}" class="bg-green-100 text-green-700 p-2 mb-4 rounded">Message sent successfully!</div>
  <form th:action="@{/contact}" method="post" class="max-w-lg">
    <div class="mb-4">
      <label class="block mb-1">Name</label>
      <input type="text" name="name" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-4">
      <label class="block mb-1">Email</label>
      <input type="email" name="email" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-4">
      <label class="block mb-1">Message</label>
      <textarea name="message" class="w-full border p-2 rounded" required></textarea>
    </div>
    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Send</button>
  </form>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
