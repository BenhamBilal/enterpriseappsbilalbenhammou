<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
    <title>Contact - NGO Anderlecht</title>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<div th:replace="fragments/header :: menu"></div>

<main class="container mx-auto px-4 py-8 flex-grow">
    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Get in Touch</h1>
            <p class="text-gray-600 mt-2">Have a question or want to collaborate? Send us a message!</p>
        </div>

        <div th:if="${param.success}" class="mb-6 bg-green-50 border-l-4 border-green-500 text-green-700 p-4 rounded-r-lg shadow-sm">
            <div class="flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Message sent successfully! We'll get back to you soon.
            </div>
        </div>

        <form th:action="@{/contact}" method="post" class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Your Name</label>
                <input type="text" name="name" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors" placeholder="John Doe" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Your Email</label>
                <input type="email" name="email" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors" placeholder="john@example.com" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Message</label>
                <textarea name="message" rows="5" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors" placeholder="Write your message here..." required></textarea>
            </div>
            <button type="submit" class="w-full px-6 py-3 bg-accent-500 hover:bg-accent-600 text-white font-medium rounded-lg shadow-sm transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-accent-500">
                Send Message
            </button>
        </form>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
