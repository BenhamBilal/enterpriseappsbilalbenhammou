<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
  <title>New Event - NGO Anderlecht</title>
</head>
<body>
<div th:replace="fragments/header :: menu"></div>

<main class="container mx-auto p-4">
  <h1 class="text-2xl font-bold mb-4">Create New Event</h1>
  <div th:if="${error}" class="bg-red-100 text-red-700 p-2 mb-4 rounded" th:text="${error}"></div>
  <form th:action="@{/new}" method="post" class="max-w-lg">
    <div class="mb-4">
      <label class="block mb-1">Title</label>
      <input type="text" name="title" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-4">
      <label class="block mb-1">Description</label>
      <textarea name="description" class="w-full border p-2 rounded" required></textarea>
    </div>
    <div class="mb-4">
      <label class="block mb-1">Organization</label>
      <input type="text" name="organization" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-4">
      <label class="block mb-1">Contact Email</label>
      <input type="email" name="contactEmail" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-4">
      <label class="block mb-1">Date & Time</label>
      <input type="datetime-local" name="timestamp" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-4">
      <label class="block mb-1">Location</label>
      <select name="locationId" class="w-full border p-2 rounded" required>
        <option value="">Select a location</option>
        <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
      </select>
    </div>
    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Save</button>
  </form>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
